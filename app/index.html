<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>Streaks — Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">🔥</span>
        <h1>Streaks</h1>
      </div>
      <p class="date" id="todayLabel"></p>
    </header>

    <section class="stats" id="stats" aria-label="Overall statistics">
      <div class="stat-card">
        <span class="stat-value" id="statDoneToday">0/0</span>
        <span class="stat-label">Done today</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statBestStreak">0</span>
        <span class="stat-label">Best streak</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Total check-ins</span>
      </div>
    </section>

    <main id="habitList" class="habit-list" aria-live="polite"></main>

    <div class="empty" id="emptyState" hidden>
      <p class="empty-emoji">🌱</p>
      <p class="empty-title">No habits yet</p>
      <p class="empty-sub">Add your first habit below and start a streak today.</p>
    </div>

    <button class="fab" id="openAdd" aria-label="Add habit">+</button>
  </div>

  <!-- Add habit dialog -->
  <div class="modal-backdrop" id="modal" hidden>
    <form class="modal" id="addForm">
      <h2>New habit</h2>
      <label class="field">
        <span>Name</span>
        <input type="text" id="habitName" maxlength="40" placeholder="Drink water, Read, Exercise…" required autocomplete="off" />
      </label>

      <label class="field">
        <span>Emoji</span>
        <input type="text" id="habitEmoji" maxlength="2" placeholder="💧" value="✅" />
      </label>

      <fieldset class="field">
        <span>Color</span>
        <div class="swatches" id="swatches"></div>
      </fieldset>

      <div class="modal-actions">
        <button type="button" class="btn ghost" id="cancelAdd">Cancel</button>
        <button type="submit" class="btn primary">Add habit</button>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
